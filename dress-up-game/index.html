<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梦幻换装屋 ✨</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>✨ 我的换装屋 ✨</h1>
      <p class="subtitle">专属你的卡通形象 · 挑选今天的造型吧！</p>
    </header>

    <main class="stage-wrap">
      <!-- 角色舞台 -->
      <section class="stage" id="stage">
        <svg id="doll" viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg" aria-label="换装角色">
          <!-- 背景层(由 JS 填充) -->
          <rect id="bg-layer" x="0" y="0" width="300" height="460" fill="#fde7f3" />

          <!-- 身体 -->
          <g id="body">
            <!-- 翅膀等身后配饰(由 JS 填充) -->
            <g id="behind-layer"></g>
            <!-- 腿 -->
            <rect x="128" y="300" width="18" height="110" rx="9" id="leg-l" class="skin" fill="#ffe0c2" />
            <rect x="154" y="300" width="18" height="110" rx="9" id="leg-r" class="skin" fill="#ffe0c2" />
            <!-- 鞋(由 JS 填充) -->
            <g id="shoes-layer"></g>
            <!-- 内搭:短裤(始终穿着,由 JS 填充) -->
            <g id="inner-bottom-layer"></g>
            <!-- 下装(由 JS 填充) -->
            <g id="bottom-layer"></g>
            <!-- 躯干 -->
            <rect x="120" y="210" width="60" height="105" rx="22" id="torso" class="skin" fill="#ffe0c2" />
            <!-- 手臂 -->
            <rect x="100" y="218" width="16" height="80" rx="8" class="skin" fill="#ffe0c2" />
            <rect x="184" y="218" width="16" height="80" rx="8" class="skin" fill="#ffe0c2" />
            <!-- 内搭:吊带背心(始终穿着,由 JS 填充) -->
            <g id="inner-top-layer"></g>
            <!-- 上装(由 JS 填充) -->
            <g id="top-layer"></g>
            <!-- 脖子 -->
            <rect x="140" y="178" width="20" height="30" rx="8" class="skin" fill="#ffe0c2" />
            <!-- 头 -->
            <g id="head">
              <ellipse cx="150" cy="152" rx="45" ry="50" class="skin" fill="#ffe0c2" />
              <!-- 下巴稍尖,更接近瓜子脸 -->
              <path d="M118 168 Q150 210 182 168 Q170 196 150 200 Q130 196 118 168 Z" class="skin" fill="#ffe0c2" />
              <!-- 耳朵 -->
              <ellipse cx="106" cy="156" rx="7" ry="11" class="skin" fill="#ffe0c2" />
              <ellipse cx="194" cy="156" rx="7" ry="11" class="skin" fill="#ffe0c2" />
              <!-- 鼻子 -->
              <path d="M149 158 Q147 164 151 165" stroke="#c79a86" stroke-width="1.5" fill="none" stroke-linecap="round" />
              <!-- 表情(眉/眼/嘴/腮红 由 JS 填充,可切换) -->
              <g id="face-layer"></g>
            </g>
            <!-- 头发(由 JS 填充) -->
            <g id="hair-layer"></g>
            <!-- 配饰(由 JS 填充) -->
            <g id="acc-layer"></g>
          </g>
        </svg>
      </section>

      <!-- 控制面板 -->
      <section class="panel">
        <div class="tabs" id="tabs"></div>
        <div class="options" id="options"></div>

        <div class="actions">
          <button id="randomBtn" class="btn btn-accent">🎲 随机造型</button>
          <button id="resetBtn" class="btn">↺ 重置</button>
          <button id="saveBtn" class="btn btn-primary">📷 保存图片</button>
        </div>

        <div class="slots-wrap">
          <span class="slots-hint">收藏槽（点击保存/读取 · 右键清空）：</span>
          <div class="slots" id="slots"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="charinfo">
        🌸 <b>自定义</b> · 18岁 · 165cm · 温柔 / 文静 / 善良 · 热爱花草和阳光,偶尔有点小迷糊
      </div>
      用 SVG 纯手工打造 · 直接在浏览器中游玩 💖
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
