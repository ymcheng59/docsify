<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的换装屋 ✨</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>✨ 我的换装屋 ✨</h1>
      <p class="subtitle">专属你的卡通形象 · 自由搭配今天的造型吧！</p>
    </header>

    <main class="stage-wrap">
      <!-- 立绘 + 叠加图层 -->
      <section class="stage mix-stage" id="stage">
        <div class="doll-canvas" id="canvas">
          <img class="base" id="base" src="assets/初始造型.png" alt="角色底图" />
          <img class="layer" id="layer-shoes" alt="" />
          <img class="layer" id="layer-bottom" alt="" />
          <img class="layer" id="layer-top" alt="" />
          <img class="layer" id="layer-dress" alt="" />
          <img class="layer" id="layer-bag" alt="" />
          <img class="layer" id="layer-hat" alt="" />
        </div>
      </section>

      <!-- 控制面板 -->
      <section class="panel">
        <div class="tabs" id="tabs"></div>
        <div class="options" id="options"></div>

        <div class="actions">
          <button id="randomBtn" class="btn btn-accent">🎲 随机</button>
          <button id="resetBtn" class="btn">↺ 重置</button>
          <button id="saveBtn" class="btn btn-primary">📷 保存图片</button>
        </div>
        <p class="add-tip" id="tuneTip">提示：衣服是平铺图叠加，位置可能需要微调。觉得哪件没对齐告诉我，我来校准。</p>
      </section>
    </main>

    <footer class="footer">
      <div class="charinfo">
        🌸 <b>自定义</b> · 18岁 · 165cm · 温柔 / 文静 / 善良 · 热爱花草和阳光,偶尔有点小迷糊
      </div>
      其它玩法：<a href="./gallery.html">整套造型相册</a> · <a href="./doll.html">手绘 SVG 换装</a>
    </footer>
  </div>

  <script src="mix.js"></script>
</body>
</html>
