<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梦幻换装屋 ✨</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>✨ 梦幻换装屋 ✨</h1>
      <p class="subtitle">给小可爱挑选今天的造型吧！</p>
    </header>

    <main class="stage-wrap">
      <!-- 角色舞台 -->
      <section class="stage" id="stage">
        <svg id="doll" viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg" aria-label="换装角色">
          <!-- 背景层(由 JS 填充) -->
          <rect id="bg-layer" x="0" y="0" width="300" height="460" fill="#fde7f3" />

          <!-- 身体 -->
          <g id="body">
            <!-- 翅膀等身后配饰(由 JS 填充) -->
            <g id="behind-layer"></g>
            <!-- 腿 -->
            <rect x="128" y="300" width="18" height="110" rx="9" id="leg-l" class="skin" fill="#ffe0c2" />
            <rect x="154" y="300" width="18" height="110" rx="9" id="leg-r" class="skin" fill="#ffe0c2" />
            <!-- 鞋(由 JS 填充) -->
            <g id="shoes-layer"></g>
            <!-- 下装(由 JS 填充) -->
            <g id="bottom-layer"></g>
            <!-- 躯干 -->
            <rect x="120" y="210" width="60" height="105" rx="22" id="torso" class="skin" fill="#ffe0c2" />
            <!-- 手臂 -->
            <rect x="100" y="218" width="16" height="80" rx="8" class="skin" fill="#ffe0c2" />
            <rect x="184" y="218" width="16" height="80" rx="8" class="skin" fill="#ffe0c2" />
            <!-- 上装(由 JS 填充) -->
            <g id="top-layer"></g>
            <!-- 脖子 -->
            <rect x="140" y="178" width="20" height="30" rx="8" class="skin" fill="#ffe0c2" />
            <!-- 头 -->
            <g id="head">
              <ellipse cx="150" cy="150" rx="46" ry="50" class="skin" fill="#ffe0c2" />
              <!-- 腮红 -->
              <circle cx="124" cy="160" r="8" fill="#ffb3c6" opacity="0.55" />
              <circle cx="176" cy="160" r="8" fill="#ffb3c6" opacity="0.55" />
              <!-- 眼睛 -->
              <g id="eyes">
                <ellipse cx="133" cy="148" rx="6" ry="8" fill="#3a2b2b" />
                <ellipse cx="167" cy="148" rx="6" ry="8" fill="#3a2b2b" />
                <circle cx="135" cy="145" r="2" fill="#fff" />
                <circle cx="169" cy="145" r="2" fill="#fff" />
              </g>
              <!-- 嘴 -->
              <path d="M142 168 Q150 176 158 168" stroke="#d6607a" stroke-width="3" fill="none" stroke-linecap="round" />
            </g>
            <!-- 头发(由 JS 填充) -->
            <g id="hair-layer"></g>
            <!-- 配饰(由 JS 填充) -->
            <g id="acc-layer"></g>
          </g>
        </svg>
      </section>

      <!-- 控制面板 -->
      <section class="panel">
        <div class="tabs" id="tabs"></div>
        <div class="options" id="options"></div>

        <div class="actions">
          <button id="randomBtn" class="btn btn-accent">🎲 随机造型</button>
          <button id="resetBtn" class="btn">↺ 重置</button>
          <button id="saveBtn" class="btn btn-primary">📷 保存图片</button>
        </div>

        <div class="slots-wrap">
          <span class="slots-hint">收藏槽（点击保存/读取 · 右键清空）：</span>
          <div class="slots" id="slots"></div>
        </div>
      </section>
    </main>

    <footer class="footer">用 SVG 纯手工打造 · 直接在浏览器中游玩 💖</footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
